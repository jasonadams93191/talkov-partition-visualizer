<style>
  body { font-family: 'Lato', sans-serif; background: linear-gradient(135deg, #F5F5F5 0%, #eeeeee 100%); }
  h1,h2,h3,h4 { font-family: 'Montserrat', sans-serif; }
  .mono-num { font-variant-numeric: tabular-nums; }
  .mermaid svg { width: 100% !important; height: 100% !important; max-width: none !important; cursor: grab; }
  .mermaid svg:active { cursor: grabbing; }
  #diagram-host { background: #fafbfc; border-radius: 0 0 8px 8px; height: 75vh; min-height: 600px; position: relative; overflow: hidden; }
  #diagram-host.fullscreen { height: 100vh; border-radius: 0; }
  /* SF chrome */
  .sf-appbar { background: linear-gradient(180deg, #ffffff, #f3f3f3); border-bottom: 1px solid var(--sf-border); }
  .sf-tab-active { box-shadow: inset 0 -3px 0 #0176d3; color: #032d60; }
  .sf-card { background: white; border: 1px solid #dddbda; border-radius: 6px; box-shadow: 0 2px 2px rgba(0,0,0,0.04); }
  .sf-card-header { background: #f3f3f3; border-bottom: 1px solid #dddbda; padding: 8px 12px; font-size: 13px; font-weight: 700; color: #032d60; display: flex; align-items: center; justify-content: space-between; }
  .sf-card-body { padding: 12px 14px; font-size: 13px; color: #1A1A1A; }
  .sf-detail-row { display: grid; grid-template-columns: 40% 60%; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f3f3f3; font-size: 12.5px; }
  .sf-detail-row:last-child { border-bottom: none; }
  .sf-detail-label { color: #706e6b; }
  .sf-detail-value { color: #1A1A1A; font-weight: 500; }
  .sf-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; font-family: 'Montserrat', sans-serif; }
  .sf-pill-blue { background: #cfe2ff; color: #032d60; }
  .sf-pill-green { background: #c8e6c9; color: #1b5e20; }
  .sf-pill-gold { background: #FFD700; color: #1A1A1A; }
  .sf-pill-red { background: #fce4ec; color: #b71c1c; }
  .sf-action-btn { background: white; border: 1px solid #dddbda; padding: 5px 12px; font-size: 12px; font-weight: 600; color: #032d60; border-radius: 4px; cursor: pointer; }
  .sf-action-btn:hover { background: #f3f3f3; }
  .sf-action-btn.primary { background: #0176d3; color: white; border-color: #0176d3; }
  .sf-action-btn.primary:hover { background: #014486; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: #0176d3; flex-shrink: 0; margin-top: 5px; }
  .timeline-dot.gold { background: #FFD700; }
  .timeline-dot.success { background: #28A745; }
  .timeline-dot.muted { background: #ADADAD; }
  .timeline-line { width: 2px; background: #dddbda; flex-shrink: 0; margin: 0 4px; }
  /* Mermaid theming via CSS where useful */
  .focus-pulse { animation: pulse 0.6s ease-out; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
</style>

const GLOSSARY = [
  { term: 'Partition', cite: 'CCP § 872.010 et seq.', body: "A court-supervised process for ending the co-ownership of real or personal property. Any cotenant with a present possessory interest may compel partition; the court determines whether to divide the property in kind, order it sold, or — under PRPA — let one cotenant buy out the others. The right to partition is essentially absolute absent a clear-and-convincing written waiver." },
  { term: 'Tenancy in Common (TIC)', cite: 'Civil Code § 685', body: 'A form of co-ownership in which each cotenant owns an undivided fractional interest, with no right of survivorship. Each TIC interest can be sold, mortgaged, or devised independently. The vast majority of partition matters involve TIC. Under PRPA, any TIC without a written partition agreement triggers special protections (appraisal, buyout right, open-market sale).' },
  { term: 'Joint Tenancy', cite: 'Civil Code § 683', body: 'Co-ownership with right of survivorship: when one joint tenant dies, the other(s) take by operation of law, not probate. Partition is available between living joint tenants and severs the joint tenancy on filing — flipping the remaining interests to TIC. Common in divorce-related partition.' },
  { term: 'Lis Pendens (Notice of Pendency of Action)', cite: 'CCP §§ 405.20, 872.250', body: 'A recorded notice that a lawsuit affecting title to specific real property is pending. § 872.250 makes it mandatory for partition plaintiffs and requires it be recorded "immediately upon" filing. Must be served by certified mail per § 405.22. Defective service is the most common ground for expungement, and the prevailing party on a motion to expunge gets attorney fees under § 405.38 — a real risk if recording is sloppy.' },
  { term: 'Verified Complaint', cite: 'CCP § 872.230', body: "The plaintiff's opening pleading, sworn under penalty of perjury. Must contain a description of the property, the plaintiff's interest, all persons known to have any interest, the basis for partition, and the manner of partition sought. Verification distinguishes partition from most civil pleadings, which are not required to be verified." },
  { term: 'Interlocutory Judgment of Partition', cite: 'CCP § 872.720', body: "The court's first major order in a partition action. Determines (1) the right to partition, (2) each party's fractional interest, and (3) the manner of partition (sale, in kind, or by appraisal). Also appoints a partition referee. In Talkov's two-phase framing, the interlocutory judgment marks the end of phase one (force the sale) and the start of phase two (divide the proceeds)." },
  { term: 'Partition Referee', cite: 'CCP § 873.010', body: 'A court-appointed officer who carries out the partition. Often a real-estate attorney or licensed broker. Authority under § 873.060 includes hiring a broker, listing the property, accepting offers (subject to court confirmation), preventing waste, collecting rents, and reporting to the court. The referee — not the parties — runs the sale.' },
  { term: 'Manner of Partition', cite: 'CCP §§ 873.210, 873.510, 873.910', body: 'How the property is divided. Three options: (1) in kind — physical division (rare, suitable mostly for raw land); (2) by sale — the modal outcome; (3) by appraisal — only available if all cotenants stipulate (Cummings v. Dessel). Court decides between in kind and sale based on which would result in "great prejudice" to any party — sale is preferred when in-kind division would meaningfully reduce total value.' },
  { term: 'PRPA — Partition of Real Property Act', cite: 'CCP §§ 874.311-874.323 (eff. 1/1/2023)', body: "California's 2023 overhaul of partition for tenancy-in-common property without a written partition agreement (AB 2245). Adds a court-ordered appraisal, a 45-day cotenant buyout right, and an open-market-sale preference (over the old auction default). Replaces the short-lived UPHPA (Uniform Partition of Heirs Property Act) and broadens its protections to all qualifying TIC, not just heirs property." },
  { term: 'Cotenant Buyout Right', cite: 'CCP § 874.317', body: "Under PRPA: any non-partitioning cotenant has 45 days from the court's notice to elect to buy the partitioning cotenant's interest at appraised value × that cotenant's fractional share. If multiple cotenants elect, they share pro rata. Election triggers a 60-day funding window. The most powerful new tool in California partition practice." },
  { term: 'Open-Market Sale (PRPA)', cite: 'CCP § 874.319', body: "PRPA's preferred sale method when no buyout closes. Court appoints a real-estate broker (not a referee auctioneer) to list at not less than appraised value, run a reasonable marketing period on the open market, and collect offers — sealed bids permitted. Court still confirms the final sale. Replaces the old auction default and typically achieves higher sale prices." },
  { term: 'Cotenancy Accounting (Offsets)', cite: 'CCP § 872.140; Wallace v. Daley; Hunter v. Schultz', body: 'Equity-driven adjustments among cotenants. A cotenant who pays mortgage P&I, taxes, insurance, necessary repairs, or value-enhancing improvements gets credit and contribution from the others (Wallace v. Daley, Willmon v. Koyer). Often dispositive of net proceeds — a $300K case can flip to a $50K case after offsets. The "second phase" Talkov sells against.' },
  { term: 'Rental Value Offset', cite: 'Hunter v. Schultz (1966) 240 Cal.App.2d 24', body: "When one cotenant has been in exclusive possession, her contribution claims (mortgage, taxes, etc.) are reduced — defensively, dollar-for-dollar — by the reasonable rental value of the others' shares she enjoyed. Importantly, this is a defensive offset only: without ouster, the out-of-possession cotenants do not affirmatively recover rents." },
  { term: 'Ouster', cite: 'Estate of Hughes (1992) 5 Cal.App.4th 1607', body: 'An adverse act by a cotenant in possession that excludes the others — changing locks, denying access, repudiating co-ownership in writing, etc. Mere exclusive occupancy is not ouster. Without ouster pled and proven, out-of-possession cotenants cannot affirmatively recover rents from the cotenant in possession; they get only the defensive Hunter offset.' },
  { term: 'Common Benefit / Fee Apportionment', cite: 'CCP § 874.040; Orien v. Lutz', body: '"The court shall apportion the costs of partition among the parties in proportion to their interests or make such other apportionment as may be equitable." Attorney fees expended for the common benefit of all cotenants are recoverable; non-common-benefit work (litigating contested offsets, fighting ouster claims) is not. Realizing fee shifting requires tagging time entries at entry, not retrofitting at the end.' },
  { term: 'Overbid Procedure', cite: 'CCP § 873.740', body: "At the sale-confirmation hearing, the court can accept a higher bid from anyone present in court, not just the original buyer. Statutory minimum overbid: 10% over the first $10,000, plus 5% over the balance. If accepted, the original buyer's deposit is returned and the sale closes with the overbidder. Easy to automate; easy to get wrong by hand." },
  { term: 'MSA — Motion for Summary Adjudication', cite: 'CCP §§ 437c, 872.710', body: 'The workhorse motion in partition. Establishes the absolute right to partition (Capuccio v. Caire, LEG Investments v. Boxler) without trial — the court can move directly to interlocutory judgment when no triable issue exists on the right to partition (Summers v. Superior Court). Cuts months of litigation off the front of every contested case.' },
];

// ----- Workflow tab (THE critical fix) ----------------------------------

function WorkflowTab() {
  // hostRef → an inner div with NO React children. Mermaid's SVG goes here; React
  // never reconciles its content, so re-renders triggered by state changes
  // (zoom %, focus button highlight) cannot wipe the diagram.
  const hostRef = useRef(null);
  const panZoomRef = useRef(null);
  const [status, setStatus] = useState('init'); // init | loading | ready | error
  const [errMsg, setErrMsg] = useState('');
  const [zoomPct, setZoomPct] = useState(100);
  const [activeFocus, setActiveFocus] = useState(null);

  useEffect(() => {
    let cancelled = false;
    let resizeObserver;

    const wait = (ms) => new Promise((r) => setTimeout(r, ms));

    const init = async () => {
      setStatus('loading');
      // 1. Wait until BOTH libraries are loaded.
      let tries = 0;
      while ((!window.mermaid || !window.svgPanZoom) && tries < 60) {
        await wait(100);
        tries++;
        if (cancelled) return;
      }
      if (!window.mermaid) {
        setErrMsg('Mermaid library failed to load');
        setStatus('error');
        return;
      }
      if (!window.svgPanZoom) {
        setErrMsg('svg-pan-zoom library failed to load');
        setStatus('error');
        return;
      }

      // 2. Initialize mermaid
      try {
        window.mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          themeVariables: {
            primaryColor: '#E8F0FE',
            primaryTextColor: '#1A1A1A',
            primaryBorderColor: '#0057B8',
            lineColor: '#003D80',
            secondaryColor: '#FFF8E1',
            tertiaryColor: '#F5F5F5',
            fontFamily: 'Montserrat, sans-serif',
            fontSize: '13px',
            clusterBkg: '#FAFAFA',
            clusterBorder: '#0057B8',
            edgeLabelBackground: '#FFFFFF',
          },
          flowchart: { htmlLabels: true, curve: 'basis', padding: 16, nodeSpacing: 28, rankSpacing: 50 },
        });
      } catch (e) {
        console.error('mermaid.initialize failed:', e);
        setErrMsg('Mermaid init failed: ' + e.message);
        setStatus('error');
        return;
      }

      // 3. Render the flowchart
      let svg;
      try {
        const id = 'partition-mermaid-' + Math.floor(Math.random() * 1e9);
        const result = await window.mermaid.render(id, MERMAID_SOURCE);
        svg = result.svg;
      } catch (e) {
        console.error('mermaid.render failed:', e);
        setErrMsg('Render failed: ' + e.message);
        setStatus('error');
        return;
      }
      if (cancelled || !hostRef.current) return;

      // 4. Inject SVG into the uncontrolled host div
      hostRef.current.innerHTML = svg;
      const svgEl = hostRef.current.querySelector('svg');
      if (!svgEl) {
        setErrMsg('SVG not found after render');
        setStatus('error');
        return;
      }
      svgEl.removeAttribute('width');
      svgEl.removeAttribute('height');
      svgEl.style.width = '100%';
      svgEl.style.height = '100%';
      svgEl.style.maxWidth = 'none';
      svgEl.style.display = 'block';

      // 5. Attach svg-pan-zoom
      try {
        panZoomRef.current = window.svgPanZoom(svgEl, {
          zoomEnabled: true,
          panEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true,
          minZoom: 0.2,
          maxZoom: 8,
          zoomScaleSensitivity: 0.4,
          onZoom: (z) => setZoomPct(Math.round(z * 100)),
        });
        setZoomPct(Math.round(panZoomRef.current.getZoom() * 100));
      } catch (e) {
        console.error('svgPanZoom init failed:', e);
        setErrMsg('Pan/zoom init failed: ' + e.message);
        setStatus('error');
        return;
      }

      // 6. Resize observer to keep diagram fit when container resizes
      resizeObserver = new ResizeObserver(() => {
        if (panZoomRef.current) {
          panZoomRef.current.resize();
          panZoomRef.current.fit();
          panZoomRef.current.center();
        }
      });
      if (hostRef.current) resizeObserver.observe(hostRef.current);

      setStatus('ready');
      console.log('[WorkflowTab] diagram ready. cluster ids:',
        Array.from(svgEl.querySelectorAll('g.cluster, g.subgraph')).map((g) => g.id));
    };

    init();

    return () => {
      cancelled = true;
      if (resizeObserver) resizeObserver.disconnect();
      if (panZoomRef.current) {
        try { panZoomRef.current.destroy(); } catch (e) {}
        panZoomRef.current = null;
      }
      // Clean up the injected SVG so a remount starts fresh
      if (hostRef.current) hostRef.current.innerHTML = '';
    };
  }, []);

  const zoomIn = () => panZoomRef.current?.zoomBy(1.3);
  const zoomOut = () => panZoomRef.current?.zoomBy(0.77);
  const fit = () => {
    if (!panZoomRef.current) return;
    panZoomRef.current.resize();
    panZoomRef.current.fit();
    panZoomRef.current.center();
    setActiveFocus(null);
  };
  const fullscreen = () => {
    const c = document.getElementById('diagram-host');
    if (!c) return;
    if (!document.fullscreenElement) {
      c.classList.add('fullscreen');
      c.requestFullscreen?.();
    } else {
      c.classList.remove('fullscreen');
      document.exitFullscreen?.();
    }
    setTimeout(() => {
      if (panZoomRef.current) {
        panZoomRef.current.resize();
        panZoomRef.current.fit();
        panZoomRef.current.center();
      }
    }, 250);
  };

  const findCluster = (subgraphId) => {
    const svg = hostRef.current?.querySelector('svg');
    if (!svg) return null;
    const clusters = Array.from(svg.querySelectorAll('g.cluster, g.subgraph, g[id^="flowchart-"], g[id^="subGraph"]'));
    // Strategy 1: id contains the subgraphId verbatim
    for (const g of clusters) {
      if (g.id && g.id.toUpperCase().includes(subgraphId)) return g;
    }
    // Strategy 2: label-text match
    const LABEL_MAP = {
      INTAKE: /^\s*1\.\s*INTAKE\s*$/i,
      CONSULT: /CONSULTATION/i,
      PRELIT: /PRE-?LITIGATION/i,
      PLEAD: /PLEADINGS/i,
      DISC: /DISCOVERY/i,
      PRPA_BRANCH: /PRPA TRACK/i,
      IJ: /INTERLOCUTORY/i,
      SALE: /MANNER OF PARTITION/i,
      ACCT: /ACCOUNTING/i,
      FEES: /FINAL JUDGMENT/i,
      CLOSE: /CLOSEOUT/i,
    };
    const re = LABEL_MAP[subgraphId];
    if (re) {
      // Look at cluster-label text specifically (not the children)
      for (const g of clusters) {
        const labelEl = g.querySelector('.cluster-label, .nodeLabel, foreignObject, text');
        const t = (labelEl?.textContent || '').trim();
        if (re.test(t)) return g;
      }
      // Last resort: full textContent
      for (const g of clusters) {
        const t = (g.textContent || '').trim();
        if (re.test(t)) return g;
      }
    }
    return null;
  };

  const focusOn = (subgraphId) => {
    if (!panZoomRef.current || !hostRef.current) return;
    const cluster = findCluster(subgraphId);
    if (!cluster) {
      console.warn('[focusOn] cluster not found for', subgraphId,
        '— available cluster ids:',
        Array.from(hostRef.current.querySelectorAll('g.cluster, g.subgraph')).map(g => g.id));
      return;
    }
    const bbox = cluster.getBBox();
    if (!bbox.width || !bbox.height) {
      console.warn('[focusOn] zero bbox for', subgraphId);
      return;
    }

    // Step 1: reset to a known fit state.
    panZoomRef.current.resize();
    panZoomRef.current.fit();
    panZoomRef.current.center();

    // Step 2: compute desired realZoom (SVG-units → pixel scale).
    const sizes = panZoomRef.current.getSizes();
    const targetRealZoom = 0.85 * Math.min(sizes.width / bbox.width, sizes.height / bbox.height);
    // svg-pan-zoom uses zoom relative to the original SVG. realZoom = zoom * sizes.realZoom_at_zoom_1.
    // Easiest: compute zoom factor relative to current state.
    const currentZoom = panZoomRef.current.getZoom();
    const zoomFactor = targetRealZoom / sizes.realZoom;
    panZoomRef.current.zoom(currentZoom * zoomFactor);

    // Step 3: pan to center cluster center in viewport.
    const after = panZoomRef.current.getSizes();
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;
    // Viewport pixel coords of the SVG point: (svg - viewBox.xy) * realZoom + currentPan
    // We want this to equal viewport center.
    // currentPan after fit+zoom is unknown; query it:
    const pan = panZoomRef.current.getPan();
    const desiredX = after.width / 2;
    const desiredY = after.height / 2;
    const currentPxX = (cx - after.viewBox.x) * after.realZoom + pan.x;
    const currentPxY = (cy - after.viewBox.y) * after.realZoom + pan.y;
    panZoomRef.current.panBy({
      x: desiredX - currentPxX,
      y: desiredY - currentPxY,
    });

    setZoomPct(Math.round(panZoomRef.current.getZoom() * 100));
    setActiveFocus(subgraphId);
  };

  const FocusButton = ({ id, label, prpa }) => (
    <button
      onClick={() => focusOn(id)}
      className={`px-3 py-1 rounded-full font-mont font-semibold text-[11.5px] border transition-all ${
        activeFocus === id
          ? 'bg-acs-gold border-acs-charcoal text-acs-charcoal'
          : prpa
            ? 'bg-yellow-50 border-acs-gold text-acs-charcoal border-dashed hover:bg-acs-gold'
            : 'bg-acs-light-blue border-acs-blue text-acs-blue hover:bg-acs-blue hover:text-white'
      }`}
    >
      {label}
    </button>
  );

  return (
    <div className="space-y-3">
      <div className="bg-white rounded-t-lg shadow-sm p-3 flex flex-wrap justify-between items-center gap-3 border-b-2 border-acs-light-blue">
        <div className="flex gap-1.5 items-center flex-wrap">
          <span className="font-mont text-[11px] font-bold text-gray-500 tracking-wider mr-1">ZOOM</span>
          <button onClick={zoomOut} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-base font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">−</button>
          <span className="font-mont text-[12px] font-bold px-2 mono-num min-w-[50px] text-center">{zoomPct}%</span>
          <button onClick={zoomIn} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-base font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">+</button>
          <button onClick={fit} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-[12px] font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">⛶ Fit All</button>
          <button onClick={fullscreen} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-[12px] font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">⤢ Full</button>
        </div>
        <div className="flex gap-1.5 items-center flex-wrap">
          <span className="font-mont text-[11px] font-bold text-gray-500 tracking-wider mr-1">FOCUS</span>
          <FocusButton id="INTAKE" label="1. Intake" />
          <FocusButton id="CONSULT" label="2. Consult" />
          <FocusButton id="PRELIT" label="3. Pre-Lit" />
          <FocusButton id="PLEAD" label="4. Pleadings" />
          <FocusButton id="DISC" label="5. Discovery" />
          <FocusButton id="PRPA_BRANCH" label="6. PRPA" prpa />
          <FocusButton id="IJ" label="7. Interlocutory" />
          <FocusButton id="SALE" label="8. Sale" />
          <FocusButton id="ACCT" label="9. Accounting" />
          <FocusButton id="FEES" label="10. Fees" />
          <FocusButton id="CLOSE" label="11. Closeout" />
        </div>
      </div>

      <div id="diagram-host" className="bg-white shadow-sm rounded-b-lg relative">
        {/* Uncontrolled host: React renders this div empty, JS injects SVG into it */}
        <div ref={hostRef} className="absolute inset-0" />
        {/* Overlays are SIBLINGS (not children) so React's reconciliation never touches the SVG */}
        {status !== 'ready' && (
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div className={`font-mont text-sm px-4 py-2 rounded ${status === 'error' ? 'text-acs-error bg-red-50 border border-red-200' : 'text-gray-500 bg-white/80'}`}>
              {status === 'init' && 'Initializing…'}
              {status === 'loading' && 'Rendering workflow…'}
              {status === 'error' && (errMsg || 'Failed to render. See browser console.')}
            </div>
          </div>
        )}
      </div>

      <div className="bg-white p-3.5 rounded-md text-[12.5px] border-l-[3px] border-acs-gold shadow-sm">
        <strong className="font-mont text-acs-blue">How to use:</strong> drag to pan · scroll-wheel or +/− to zoom · click any phase chip above to fly to that swim-lane · ⤢ Full goes fullscreen. Decision diamonds are gold; PRPA swim-lane is dashed (conditional). For task-level breakdown of any phase, jump to <em>Partition Lifecycle</em> and expand the phase card.
      </div>

      <div className="bg-white p-3 px-4 rounded shadow-sm flex flex-wrap gap-3.5 text-[12px]">
        {[
          ['#E8F0FE','#0057B8','Standard phase'],
          ['#FFF8E1','#FFD700','PRPA conditional'],
          ['#D4EDDA','#28A745','Sale execution'],
          ['#FFD700','#003D80','Decision point'],
          ['#F5F5F5','#ADADAD','Closeout'],
        ].map(([bg,bd,label]) => (
          <span key={label} className="flex items-center gap-1.5">
            <span className="inline-block w-3.5 h-3.5 rounded-sm border" style={{ background: bg, borderColor: bd }}></span>
            {label}
          </span>
        ))}
      </div>
    </div>

// SF Path component (chevron stages)
function SfPath({ currentPhase }) {
  const SHORT = {
    INTAKE: 'Intake',
    CONSULT: 'Consult',
    PRELIT: 'Pre-Lit',
    PLEAD: 'Pleadings',
    DISC: 'Discovery',
    PRPA_BRANCH: 'PRPA',
    IJ: 'Interlocutory',
    SALE: 'Sale',
    ACCT: 'Accounting',
    FEES: 'Fees',
    CLOSE: 'Closeout',
  };
  const ICON = {
    INTAKE: '📞',
    CONSULT: '🤝',
    PRELIT: '📋',
    PLEAD: '📝',
    DISC: '🔍',
    PRPA_BRANCH: '⚖',
    IJ: '🏛',
    SALE: '💰',
    ACCT: '📊',
    FEES: '💵',
    CLOSE: '✅',
  };

  const stepStyle = (idx, completed, current) => {
    const baseBg = current ? '#0057B8' : completed ? '#28A745' : '#ffffff';
    const baseColor = (current || completed) ? '#ffffff' : '#5e6c84';
    const isFirst = idx === 0;
    // Polygon: left notch (except first), right point. 10px notch.
    const leftPad = isFirst ? 0 : 10;
    const clipPath = isFirst
      ? 'polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%)'
      : 'polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%, 10px 50%)';
    return {
      background: baseBg,
      color: baseColor,
      clipPath,
      paddingLeft: `${10 + leftPad}px`,
      paddingRight: '14px',
      border: current ? 'none' : completed ? 'none' : '1px solid #dddbda',
      borderRight: 'none',
    };
  };

  return (
    <div className="bg-white border border-sf-border shadow-sm rounded">
      <div className="flex items-stretch p-1.5 gap-px">
        {/* Collapse arrow (matches SF) */}
        <button className="px-2 py-1 mr-1 border border-sf-border rounded text-gray-500 hover:bg-gray-50 text-[12px] flex-shrink-0">›</button>

        {/* Path steps */}
        <div className="flex items-stretch flex-1 min-w-0">
          {PHASES.map((p, idx) => {
            const completed = p.num < currentPhase;
            const current = p.num === currentPhase;
            return (
              <div
                key={p.id}
                className="flex-1 min-w-0 py-2 font-mont text-[11px] font-semibold flex items-center justify-center gap-1.5 truncate"
                style={stepStyle(idx, completed, current)}
                title={`Phase ${p.num}: ${p.title}`}
              >
                <span className="text-[12px] flex-shrink-0">{ICON[p.id]}</span>
                <span className="truncate">{SHORT[p.id]}</span>
              </div>
            );
          })}
        </div>

        {/* Mark Stage as Complete button */}
        <button className="ml-2 bg-acs-blue hover:bg-acs-dark-blue text-white px-3 py-2 rounded font-mont font-semibold text-[11.5px] flex items-center gap-1.5 flex-shrink-0 whitespace-nowrap">
          <span>✓</span>
          <span className="hidden md:inline">Mark Stage as Complete</span>
          <span className="md:hidden">Mark Complete</span>
        </button>
      </div>
    </div>
  );
}

function RelatedCaseCalendar() {
  const [view, setView] = React.useState({ year: 2026, month: 4 }); // Apr 2026 = today
  const TODAY = '2026-04-29';

  const monthName = (y, m) => new Date(y, m - 1, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
  const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
  const firstDayOfMonth = (y, m) => new Date(y, m - 1, 1).getDay();
  const fmtIso = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

  // Build 6×7 grid for the month (with leading/trailing days from adjacent months)
  const buildGrid = (y, m) => {
    const dim = daysInMonth(y, m);
    const fdow = firstDayOfMonth(y, m);
    const prevDim = daysInMonth(y, m - 1);
    const cells = [];
    // Leading days (previous month)
    for (let i = fdow - 1; i >= 0; i--) {
      const d = prevDim - i;
      const py = m === 1 ? y - 1 : y;
      const pm = m === 1 ? 12 : m - 1;
      cells.push({ date: fmtIso(py, pm, d), day: d, otherMonth: true });
    }
    // Current month
    for (let d = 1; d <= dim; d++) {
      cells.push({ date: fmtIso(y, m, d), day: d, otherMonth: false });
    }
    // Trailing days
    while (cells.length < 42) {
      const offset = cells.length - (fdow + dim) + 1;
      const ny = m === 12 ? y + 1 : y;
      const nm = m === 12 ? 1 : m + 1;
      cells.push({ date: fmtIso(ny, nm, offset), day: offset, otherMonth: true });
    }
    return cells;
  };

  const cells = buildGrid(view.year, view.month);

  const eventsByDate = {};
  MATTER.caseCalendar.forEach((e) => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });

  const eventClass = (kind, critical) => {
    if (critical) return 'bg-red-100 text-red-900 border-l-2 border-acs-error';
    switch (kind) {
      case 'court': return 'bg-blue-100 text-blue-900';
      case 'deadline': return 'bg-orange-100 text-orange-900 border-l-2 border-orange-500';
      case 'filing': return 'bg-yellow-100 text-yellow-900';
      case 'task': return 'bg-green-100 text-green-900';
      case 'milestone': return 'bg-purple-100 text-purple-900';
      case 'today': return 'bg-acs-blue text-white font-bold';
      default: return 'bg-gray-100 text-gray-700';
    }
  };

  const prev = () => setView((v) => v.month === 1 ? { year: v.year - 1, month: 12 } : { year: v.year, month: v.month - 1 });
  const next = () => setView((v) => v.month === 12 ? { year: v.year + 1, month: 1 } : { year: v.year, month: v.month + 1 });
  const today = () => setView({ year: 2026, month: 4 });

  const DOW = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];

  return (
    <div className="bg-white border border-sf-border rounded shadow-sm overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 bg-gray-50 border-b border-sf-border">

            <div className="text-[18px] font-bold font-mont text-sf-navy">{monthName(view.year, view.month)}</div>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={prev} className="sf-action-btn px-2">‹</button>
          <button onClick={today} className="sf-action-btn">Today</button>
          <button onClick={next} className="sf-action-btn px-2">›</button>
        </div>
      </div>

      {/* Day-of-week header */}
      <div className="grid grid-cols-7 bg-gray-50 border-b border-sf-border">
        {DOW.map((d) => (
          <div key={d} className="px-2 py-1.5 text-[10px] font-mont font-bold text-gray-500 tracking-wider">{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div className="grid grid-cols-7" style={{ minHeight: '500px' }}>
        {cells.map((c, i) => {
          const isToday = c.date === TODAY;
          const events = eventsByDate[c.date] || [];
          return (
            <div key={i} className={`border-r border-b border-sf-border min-h-[88px] p-1.5 ${c.otherMonth ? 'bg-gray-50' : 'bg-white'} ${isToday ? 'bg-acs-light-blue ring-1 ring-acs-blue ring-inset' : ''} hover:bg-gray-50`}>
              <div className="flex items-center justify-between">
                <span className={`text-[11.5px] font-mont font-bold ${c.otherMonth ? 'text-gray-400' : isToday ? 'text-acs-blue' : 'text-gray-700'}`}>{c.day}</span>
                <button className="text-gray-300 hover:text-acs-blue text-[12px] leading-none">+</button>
              </div>
              <div className="space-y-0.5 mt-1">
                {events.map((e, j) => (
                  <div key={j} className={`text-[9.5px] px-1.5 py-0.5 rounded truncate ${eventClass(e.kind, e.critical)}`} title={e.title}>
                    {e.owner && e.owner !== '' && <span className="font-bold mr-1">({e.owner})</span>}
                    {e.title}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div className="px-4 py-2 bg-gray-50 border-t border-sf-border flex flex-wrap gap-3 text-[10.5px] text-gray-600">
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-red-100 border-l-2 border-acs-error rounded-sm"></span>Critical deadline</span>
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-orange-100 border-l-2 border-orange-500 rounded-sm"></span>Statutory deadline</span>
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-blue-100 rounded-sm"></span>Court hearing</span>
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-yellow-100 rounded-sm"></span>Filing</span>
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-green-100 rounded-sm"></span>Task</span>
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-purple-100 rounded-sm"></span>Milestone</span>
        <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 bg-acs-blue rounded-sm"></span>Today</span>
      </div>
    </div>
  );
}

function RelatedLedger() {
  return (
    <div>

      <table className="w-full text-[12px]">
        <thead><tr className="bg-acs-blue text-white text-left">

          <th className="px-2 py-1.5 font-mont text-[10.5px] uppercase">Authority</th>
          <th className="px-2 py-1.5 font-mont text-[10.5px] uppercase text-right">Carlos</th>
          <th className="px-2 py-1.5 font-mont text-[10.5px] uppercase text-right">Maria</th>
          <th className="px-2 py-1.5 font-mont text-[10.5px] uppercase text-right">Luis</th>
        </tr></thead>
        <tbody>
          {MATTER.ledger.map((row, i) => {
            const cls = row.isFinal ? 'bg-acs-charcoal text-white font-bold border-t-2 border-acs-gold'
              : row.isTotal ? 'bg-acs-light-blue font-bold'
              : row.isHeader ? '' : (i % 2 ? 'bg-acs-light-silver' : '');
            const cellNum = (v) => {
              if (typeof v !== 'number') return v;
              const c = v > 0 ? 'text-acs-success' : v < 0 ? 'text-acs-error' : '';
              return <span className={`mono-num ${c}`}>{fmtSigned(v)}</span>;
            };
            const cellFinal = (v) => typeof v === 'number' ? <span className="mono-num">{fmt(v)}</span> : v;
            return (
              <tr key={i} className={cls}>
                <td className="px-2 py-1.5 border-b border-gray-100">{row.item}</td>
                <td className="px-2 py-1.5 border-b border-gray-100 text-[11px]">{row.authority}</td>
                <td className="px-2 py-1.5 border-b border-gray-100 text-right">{row.isFinal ? cellFinal(row.carlos) : cellNum(row.carlos)}</td>
                <td className="px-2 py-1.5 border-b border-gray-100 text-right">{row.isFinal ? cellFinal(row.maria) : cellNum(row.maria)}</td>
                <td className="px-2 py-1.5 border-b border-gray-100 text-right">{row.isFinal ? cellFinal(row.luis) : cellNum(row.luis)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ----- Build Plan tab (CaseCloud-native redesign) -----------------------

function BuildPlanTab() {
  const natives = [
    { obj: 'advpm__Matter__c', label: 'Matter (the partition action itself)', use: 'Hub object. Stage tracks the 11 phases. Custom fields for Property Address, FMV, PRPA Applicability, Track (Classic/PRPA/Appraisal).' },
    { obj: 'advpm__Participant__c', label: 'Participant (junction with Role)', use: 'Every cotenant, opposing counsel, referee, broker, appraiser, judge, escrow officer. Holds fractional interest, capacity (TIC/Joint Tenancy), and the running cotenancy ledger fields. Replaces what would otherwise be a custom Cotenant object.' },
    { obj: 'advpm__Activity_Plan_Template__c → advpm__Activity_Plan__c → advpm__Activity__c', label: 'Activity Plans with prebuilt automation', use: 'One Plan Template per phase (P1–P11). Activate "PRPA Phase Plan" on a Matter and 10 Activities auto-create with calculated due dates and predecessor/successor links via advpm__Activity_Dependency__c. The native automation engine.' },
    { obj: 'advpm__Fee_Arrangement_Template__c → advpm__Fee_Arrangement__c', label: 'Fee Arrangement (Contingency type)', use: 'Talkov\'s "No Fee Until You Win" maps directly. Template defines the contingency tier; Instance attaches to Matter. Type field already supports Contingency, Hourly, Flat Fee, Blended.' },
    { obj: 'advpm__Budget2__c + advpm__Budget_Line__c', label: 'Budget (per-matter financial tracking)', use: 'For hourly partition matters or tracking expected costs/disbursements. Budget Lines breakdown by phase or UTBMS code. Note: advpm__Budget__c is deprecated; use Budget2.' },
    { obj: 'advpm__Conflict_Check__c + advpm__Conflict_Result__c', label: 'Conflict checking (multi-party)', use: 'Critical for partition because every named co-owner must be conflict-cleared. Native object handles bulk checks at intake.' },
    { obj: 'advpm__Document__c', label: 'Documents (with DMS integration)', use: 'Files attached or linked from iManage / SharePoint / NetDocuments. Standardized partition templates (complaint, lis pendens, IJ, MTC sale, fee motion) live as templates, generate to Matter as Document records.' },
    { obj: 'advpm__Date_Calculation__c', label: 'CalendarRules date calculations', use: 'For court deadlines off case events. Pairs with PRPA_Clock__c (custom) for the PRPA-specific cascade.' },
    { obj: 'advpm__Time__c', label: 'Time entries (with common-benefit tagging)', use: 'Add a custom field "Common Benefit Y/N" + reason. § 874.040 fee-shifting requires at-entry tagging — this is a workflow rule on Time, not a new object.' },
  ];

  const customs = [
    { name: 'Lis_Pendens_Record__c', justification: 'Multi-county recording tracker. Each county where a parcel sits gets its own row with cert-mail proof, recording date, expungement status, release date. Powers § 405.38 risk dashboard. No CaseCloud native equivalent.' },
    { name: 'PRPA_Clock__c', justification: 'The four cascading PRPA clocks (10/30/45/60) keyed to the appraisal-receipt date. Auto-creates four child clock records with calculated due dates + escalation rules. CaseCloud Date_Calculation supports single-trigger calcs but not the cascade pattern PRPA requires.' },
  ];

  const recommendedAdds = [
    { name: 'Offers / Demands tracking', note: 'Not native to CaseCloud (these are Litify-native). Recommend Mitratech AppExchange evaluation, or build as a small custom object on the Matter (essentially a Demand_Position__c or use an Activity record + custom fields). Verify with Bellopede whether Mitratech has a native add-on before building.' },
    { name: 'Settlement Calculator', note: 'Not native to CaseCloud as a packaged feature. The Cotenancy Ledger on advpm__Participant__c (see above) IS effectively the partition settlement calculator — it computes per-party net distribution. Surface as an LWC on the Matter page.' },
  ];

  const sprints = [
    ['Sprint 0', '1', 'Org assessment, sandbox, brand pack, governance kickoff', 'Foundation'],
    ['Sprint 1', '2-3', 'Configure advpm__Matter__c page layouts; configure Stage values; advpm__Participant__c custom fields for cotenancy ledger', 'Data model live'],
    ['Sprint 2', '4-5', 'Activity Plan Templates P1-P4 (Intake, Consult, Pre-Lit, Pleadings); Conflict Check workflow; Intake form portal', 'Front of pipeline runs'],
    ['Sprint 3', '6-7', 'Multi-county Lis_Pendens_Record__c custom + § 405.38 risk dashboard; document templates (15 partition forms)', 'Compliance moat live'],
    ['Sprint 4', '8-9', 'PRPA_Clock__c custom + buyout tracker; Activity Plan Template P6 (PRPA cascading orchestrator)', 'PRPA practice fully automated'],
    ['Sprint 5', '10', 'Cotenancy ledger LWC on advpm__Participant__c; advpm__Time__c common-benefit tagger; final accounting schedule generator', 'Phase-2 (proceeds) automated'],
    ['Sprint 6', '11', 'Dashboards (matters by stage age, by referee, by court); contingency-fee revenue forecast; geo-routing intake', 'Reporting at the partner level'],
    ['Sprint 7', '12', 'UAT, training (cohort by office), production cutover', 'Live in 7 offices'],
  ];

  return (
    <div className="space-y-4">
      <div className="bg-white p-5 rounded-lg shadow-sm border-l-4 border-acs-gold">
        <div className="font-mont text-[15px] font-bold text-acs-blue mb-1.5">CaseCloud-native first — build only what doesn't exist</div>
        <div className="text-[13px] text-acs-charcoal leading-relaxed">Mitratech CaseCloud already ships most of what a partition practice needs. The right ACS build leans hard on native objects (Matter, Participant, Activity Plan, Fee Arrangement, Budget) and adds only two genuine customs: <strong>Lis_Pendens_Record__c</strong> for multi-county recording compliance, and <strong>PRPA_Clock__c</strong> for the four cascading PRPA deadlines. Everything else is configuration, not code.</div>
      </div>

      <h3 className="text-[18px] font-bold text-acs-blue mt-2 font-mont">CaseCloud native objects — Talkov uses these out of the box</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {natives.map((n, i) => (
          <div key={i} className="bg-white p-4 rounded-md border-l-4 border-acs-success shadow-sm">
            <div className="font-mont text-[12.5px] text-acs-charcoal font-bold mb-1">{n.label}</div>
            <code className="block bg-acs-light-silver px-2 py-1 rounded text-[11px] text-acs-dark-blue font-mono mb-2 break-words">{n.obj}</code>
            <div className="text-[12.5px] text-acs-charcoal leading-relaxed">{n.use}</div>
          </div>
        ))}
      </div>

      <h3 className="text-[18px] font-bold text-acs-blue mt-2 font-mont">Custom objects — only these two are genuinely novel</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {customs.map((c, i) => (
          <div key={i} className="bg-white p-4 rounded-md border-l-4 border-acs-gold shadow-sm">
            <code className="block bg-acs-light-silver px-2 py-1 rounded text-[12px] text-acs-dark-blue font-mono mb-2 font-bold">{c.name}</code>
            <div className="text-[12.5px] text-acs-charcoal leading-relaxed">{c.justification}</div>
          </div>
        ))}
      </div>

      <h3 className="text-[18px] font-bold text-acs-blue mt-2 font-mont">Recommended adds — verify availability before building</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {recommendedAdds.map((r, i) => (
          <div key={i} className="bg-white p-4 rounded-md border-l-4 border-gray-400 shadow-sm">
            <div className="font-mont text-[13px] text-acs-charcoal font-bold mb-1">{r.name}</div>
            <div className="text-[12.5px] text-acs-charcoal leading-relaxed">{r.note}</div>
          </div>
        ))}
      </div>

      <h3 className="text-[18px] font-bold text-acs-blue mt-3 font-mont">12-week sprint plan</h3>
      <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
        <table className="w-full text-[12.5px]">
          <thead><tr className="bg-acs-blue text-white text-left">
            <th className="px-3 py-2 font-mont text-[11px] uppercase">Sprint</th>
            <th className="px-3 py-2 font-mont text-[11px] uppercase">Weeks</th>
            <th className="px-3 py-2 font-mont text-[11px] uppercase">Build</th>
            <th className="px-3 py-2 font-mont text-[11px] uppercase">Outcome</th>
          </tr></thead>
          <tbody>
            {sprints.map((s, i) => (
              <tr key={i} className={i % 2 ? 'bg-acs-light-silver' : ''}>
                <td className="px-3 py-2 border-b font-mont font-bold text-acs-blue">{s[0]}</td>
                <td className="px-3 py-2 border-b mono-num text-center">{s[1]}</td>
                <td className="px-3 py-2 border-b">{s[2]}</td>
                <td className="px-3 py-2 border-b text-acs-success font-medium">{s[3]}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="bg-acs-charcoal text-white p-5 rounded-lg border-l-4 border-acs-gold">
        <div className="font-mont text-[14px] font-bold text-acs-gold mb-1.5">The thesis in one sentence</div>
        <div className="text-[13px] leading-relaxed">Talkov is already running a productized practice — 12 attorneys, mono-practice, dedicated technology director (Lexi Scott), 575+ matters, registered "Ending Co-Ownership Disputes®" mark. The right system isn't generic case management — it's a CaseCloud build that uses every native object Mitratech ships, plus exactly two custom objects (Lis_Pendens_Record + PRPA_Clock) for the partition-specific compliance work nothing else automates. ACS builds that.</div>
      </div>
    </div>
  );
}
